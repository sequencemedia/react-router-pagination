version: 2.1

jobs:
  publish:
    docker:
      - image: cimg/node:lts
    steps:
      - checkout
      - run:
          name: Publish to NPM
          command: |
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            echo ".publish" >> .npmignore
            git clone https://github.com/sequencemedia/publish.git .publish
            .publish/publish.sh

workflows:
  commit-workflow:
    jobs:
      - publish:
          filters:
            tags:
              only: /^v.*/
